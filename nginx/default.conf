proxy_cache_path /var/cache/nginx/image levels=1:2 keys_zone=image_cache:20m max_size=1g inactive=7d use_temp_path=off;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /asset-manifest.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /manifest.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /api/ {
        set $api_upstream fundingboost-server:8080;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /img-proxy {
        if ($arg_url = "") {
            return 400;
        }
        if ($arg_url !~* ^https?://) {
            return 400;
        }
        if ($arg_url ~* "^https?://([^/]*@)?(localhost|127\\.|0\\.0\\.0\\.0|10\\.|169\\.254\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[0-1])\\.)") {
            return 403;
        }

        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Referer "";
        proxy_set_header User-Agent "FundingBoost-ImageProxy/1.0";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        proxy_cache image_cache;
        proxy_cache_key "$scheme://$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 206 7d;
        proxy_cache_valid 301 302 1h;

        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;

        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header X-Proxy-Cache $upstream_cache_status always;
        add_header X-Image-Resize "origin" always;

        proxy_pass $arg_url;
    }

    location = /img-proxy-thumb {
        if ($arg_url = "") {
            return 400;
        }
        if ($arg_url !~* ^https?://) {
            return 400;
        }
        if ($arg_url ~* "^https?://([^/]*@)?(localhost|127\\.|0\\.0\\.0\\.0|10\\.|169\\.254\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[0-1])\\.)") {
            return 403;
        }

        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Referer "";
        proxy_set_header User-Agent "FundingBoost-ImageProxy/1.0";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        proxy_cache image_cache;
        proxy_cache_key "$scheme://$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 206 7d;
        proxy_cache_valid 301 302 1h;

        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;

        image_filter resize 320 320;
        image_filter_buffer 20M;
        image_filter_jpeg_quality 82;
        image_filter_webp_quality 82;

        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header X-Proxy-Cache $upstream_cache_status always;
        add_header X-Image-Resize "320x320" always;

        proxy_pass $arg_url;
    }

    location = /img-proxy-large {
        if ($arg_url = "") {
            return 400;
        }
        if ($arg_url !~* ^https?://) {
            return 400;
        }
        if ($arg_url ~* "^https?://([^/]*@)?(localhost|127\\.|0\\.0\\.0\\.0|10\\.|169\\.254\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[0-1])\\.)") {
            return 403;
        }

        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Referer "";
        proxy_set_header User-Agent "FundingBoost-ImageProxy/1.0";
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        proxy_cache image_cache;
        proxy_cache_key "$scheme://$host$request_uri";
        proxy_cache_lock on;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 206 7d;
        proxy_cache_valid 301 302 1h;

        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;

        image_filter resize 960 960;
        image_filter_buffer 40M;
        image_filter_jpeg_quality 85;
        image_filter_webp_quality 85;

        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header X-Proxy-Cache $upstream_cache_status always;
        add_header X-Image-Resize "960x960" always;

        proxy_pass $arg_url;
    }

}
